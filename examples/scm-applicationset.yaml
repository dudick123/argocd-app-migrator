apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: github-repos
  namespace: argocd
spec:
  generators:
    - scmProvider:
        github:
          organization: myorg
          cloneProtocol: https
          allBranches: false
        filters:
          - repositoryMatch: "^app-.*"
  template:
    metadata:
      name: '{{repository}}'
      labels:
        managed-by: argocd-applicationset
    spec:
      project: default
      source:
        repoURL: '{{url}}'
        targetRevision: '{{branch}}'
        path: kubernetes/manifests
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{repository}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
